<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pomodoro Pro - Productividad Relajante</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            transition: background-color 0.8s ease;
        }
        .timer-card {
            backdrop-filter: blur(12px);
            background-color: rgba(255, 255, 255, 0.2);
        }
        .progress-ring {
            transition: stroke-dashoffset 0.3s;
            transform: rotate(-90deg);
            transform-origin: 50% 50%;
        }
        input::-webkit-outer-spin-button,
        input::-webkit-inner-spin-button {
            -webkit-appearance: none;
            margin: 0;
        }
    </style>
</head>
<body class="bg-slate-100 text-slate-800 min-h-screen flex flex-col items-center p-4">

    <!-- Encabezado -->
    <header class="w-full max-w-md flex justify-between items-center py-6 text-white">
        <h1 class="text-2xl font-800 tracking-tight opacity-90 text-shadow-sm">POMODORO.PRO</h1>
        <button id="settingsBtn" class="p-2 hover:bg-white/20 rounded-full transition">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z" />
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" />
            </svg>
        </button>
    </header>

    <main class="w-full max-w-md flex flex-col gap-6">
        
        <!-- Tarjeta del Temporizador -->
        <div class="timer-card rounded-3xl p-8 flex flex-col items-center shadow-xl border border-white/30 text-white">
            <!-- Modos -->
            <div class="flex gap-2 mb-8 bg-black/5 p-1 rounded-xl">
                <button onclick="setMode('pomodoro')" id="btn-pomodoro" class="px-4 py-2 rounded-lg text-sm font-semibold transition">Trabajo</button>
                <button onclick="setMode('short')" id="btn-short" class="px-4 py-2 rounded-lg text-sm font-semibold transition hover:bg-white/10">Corto</button>
                <button onclick="setMode('long')" id="btn-long" class="px-4 py-2 rounded-lg text-sm font-semibold transition hover:bg-white/10">Largo</button>
            </div>

            <!-- Reloj -->
            <div class="relative flex items-center justify-center mb-8">
                <svg width="240" height="240">
                    <circle cx="120" cy="120" r="110" stroke="rgba(255,255,255,0.2)" stroke-width="6" fill="transparent" />
                    <circle id="progressCircle" cx="120" cy="120" r="110" stroke="white" stroke-width="8" fill="transparent" class="progress-ring" stroke-dasharray="691" stroke-dashoffset="0" stroke-linecap="round" />
                </svg>
                <div id="timerDisplay" class="absolute text-7xl font-800 tabular-nums">25:00</div>
            </div>

            <!-- Controles -->
            <div class="w-full flex flex-col gap-3">
                <button id="startBtn" class="w-full py-4 bg-white rounded-2xl text-xl font-bold uppercase tracking-widest transition-all active:scale-95 shadow-lg">
                    Iniciar
                </button>
                <div class="flex gap-2">
                    <button id="addTimeBtn" class="flex-1 py-3 bg-white/10 hover:bg-white/20 rounded-xl text-xs font-bold uppercase tracking-widest border border-white/10 transition">
                        +1 Min
                    </button>
                    <button id="resetBtn" class="flex-1 py-3 bg-white/10 hover:bg-white/20 rounded-xl text-xs font-bold uppercase tracking-widest border border-white/10 transition">
                        Reiniciar
                    </button>
                </div>
            </div>
        </div>

        <!-- Sección de Tareas -->
        <div class="w-full text-white">
            <div class="flex justify-between items-center mb-4">
                <h2 class="text-xl font-semibold opacity-90">Tareas</h2>
                <span id="taskStats" class="text-xs font-bold bg-white/20 px-3 py-1 rounded-full uppercase tracking-tight">0/0 completadas</span>
            </div>
            
            <div class="flex gap-2 mb-4">
                <input type="text" id="taskInput" placeholder="¿Qué vamos a lograr hoy?" class="flex-1 bg-white/10 border border-white/20 rounded-xl px-4 py-3 focus:outline-none focus:bg-white/30 placeholder-white/60">
                <button id="addTaskBtn" class="bg-white/20 p-3 rounded-xl hover:bg-white/30 transition text-white">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4" />
                    </svg>
                </button>
            </div>

            <ul id="taskList" class="flex flex-col gap-2 mb-10">
                <!-- Tareas se inyectan aquí -->
            </ul>
        </div>
    </main>

    <!-- Modal de Configuración -->
    <div id="settingsModal" class="fixed inset-0 bg-slate-900/50 backdrop-blur-md hidden items-center justify-center p-4 z-50">
        <div class="bg-white text-slate-800 rounded-3xl p-8 w-full max-w-xs shadow-2xl scale-95 transition-transform">
            <h3 class="text-xl font-bold mb-6 flex items-center gap-2">
                Ajustar Tiempos
            </h3>
            <div class="space-y-5">
                <div>
                    <label class="text-[10px] font-bold text-slate-400 uppercase tracking-wider">Sesión de Trabajo (min)</label>
                    <input type="number" id="inputPomodoro" value="25" class="w-full bg-slate-100 p-3 rounded-xl mt-1 focus:ring-2 focus:ring-slate-200 outline-none transition">
                </div>
                <div>
                    <label class="text-[10px] font-bold text-slate-400 uppercase tracking-wider">Descanso Corto (min)</label>
                    <input type="number" id="inputShort" value="5" class="w-full bg-slate-100 p-3 rounded-xl mt-1 focus:ring-2 focus:ring-slate-200 outline-none transition">
                </div>
                <div>
                    <label class="text-[10px] font-bold text-slate-400 uppercase tracking-wider">Descanso Largo (min)</label>
                    <input type="number" id="inputLong" value="15" class="w-full bg-slate-100 p-3 rounded-xl mt-1 focus:ring-2 focus:ring-slate-200 outline-none transition">
                </div>
            </div>
            <div class="flex gap-2 mt-8">
                <button id="closeSettings" class="flex-1 bg-slate-100 text-slate-500 py-3 rounded-xl font-bold hover:bg-slate-200 transition">Cerrar</button>
                <button id="saveSettings" class="flex-1 bg-slate-800 text-white py-3 rounded-xl font-bold hover:bg-slate-700 transition shadow-lg">Aplicar</button>
            </div>
        </div>
    </div>

    <script>
        let timer;
        let timeLeft;
        let isRunning = false;
        let currentMode = 'pomodoro';
        let settings = {
            pomodoro: 25 * 60,
            short: 5 * 60,
            long: 15 * 60
        };
        let tasks = [];

        const display = document.getElementById('timerDisplay');
        const startBtn = document.getElementById('startBtn');
        const progressCircle = document.getElementById('progressCircle');
        const circleRadius = 110;
        const circumference = 2 * Math.PI * circleRadius;

        function updateDisplay() {
            const minutes = Math.floor(timeLeft / 60);
            const seconds = timeLeft % 60;
            const formatted = `${minutes.toString().padStart(2, '0')}:${seconds.toString().padStart(2, '0')}`;
            display.textContent = formatted;
            document.title = `${formatted} - Pomodoro`;

            const total = settings[currentMode];
            // Asegurar que el círculo no se rompa si añadimos tiempo extra superando el original
            const ratio = Math.max(0, timeLeft / total);
            const offset = circumference - (ratio * circumference);
            progressCircle.style.strokeDashoffset = offset;
        }

        function setMode(mode) {
            currentMode = mode;
            isRunning = false;
            clearInterval(timer);
            startBtn.textContent = 'Iniciar';
            timeLeft = settings[mode];
            
            const colors = {
                pomodoro: { bg: 'bg-[#6366f1]', text: 'text-[#6366f1]' },
                short: { bg: 'bg-[#84a59d]', text: 'text-[#84a59d]' },
                long: { bg: 'bg-[#5e7ea7]', text: 'text-[#5e7ea7]' }
            };
            
            document.body.className = `${colors[mode].bg} min-h-screen flex flex-col items-center p-4 transition-colors duration-1000`;
            startBtn.className = `w-full py-4 bg-white ${colors[mode].text} rounded-2xl text-xl font-bold uppercase tracking-widest transition-all active:scale-95 shadow-lg`;
            
            ['pomodoro', 'short', 'long'].forEach(m => {
                const btn = document.getElementById(`btn-${m}`);
                btn.classList.remove('bg-white/20', 'shadow-inner');
                if(m === mode) btn.classList.add('bg-white/20', 'shadow-inner');
            });

            updateDisplay();
        }

        function toggleTimer() {
            if (isRunning) {
                clearInterval(timer);
                startBtn.textContent = 'Continuar';
            } else {
                startBtn.textContent = 'Pausar';
                timer = setInterval(() => {
                    timeLeft--;
                    updateDisplay();
                    if (timeLeft <= 0) {
                        clearInterval(timer);
                        notify();
                        setMode(currentMode);
                    }
                }, 1000);
            }
            isRunning = !isRunning;
        }

        function addMinute() {
            timeLeft += 60;
            // Actualizamos la base de tiempo si el tiempo actual supera el total configurado 
            // para que el círculo de progreso tenga sentido visual
            if (timeLeft > settings[currentMode]) {
                settings[currentMode] = timeLeft;
            }
            updateDisplay();
        }

        function notify() {
            const msg = new SpeechSynthesisUtterance();
            msg.text = currentMode === 'pomodoro' ? "Tiempo de trabajo terminado." : "Descanso terminado.";
            msg.lang = 'es-ES';
            window.speechSynthesis.speak(msg);
        }

        function renderTasks() {
            const list = document.getElementById('taskList');
            list.innerHTML = '';
            tasks.forEach((task, index) => {
                const li = document.createElement('li');
                li.className = `flex justify-between items-center p-4 rounded-2xl border border-white/10 transition-all ${task.completed ? 'bg-black/10 opacity-60' : 'bg-white/10'}`;
                li.innerHTML = `
                    <div class="flex items-center gap-3 cursor-pointer flex-1" onclick="toggleTask(${index})">
                        <div class="w-5 h-5 rounded-md border-2 border-white/40 flex items-center justify-center transition-colors ${task.completed ? 'bg-white border-white' : ''}">
                            ${task.completed ? '<svg class="w-3 h-3 text-slate-600" fill="currentColor" viewBox="0 0 20 20"><path d="M16.707 5.293a1 1 0 010 1.414l-8 8a1 1 0 01-1.414 0l-4-4a1 1 0 011.414-1.414L8 12.586l7.293-7.293a1 1 0 011.414 0z"/></svg>' : ''}
                        </div>
                        <span class="text-sm font-medium ${task.completed ? 'line-through opacity-70' : ''}">${task.text}</span>
                    </div>
                    <button onclick="deleteTask(${index})" class="ml-4 p-1 text-white/30 hover:text-white transition">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" viewBox="0 0 20 20" fill="currentColor">
                            <path fill-rule="evenodd" d="M9 2a1 1 0 00-.894.553L7.382 4H4a1 1 0 000 2v10a2 2 0 002 2h8a2 2 0 002-2V6a1 1 0 100-2h-3.382l-.724-1.447A1 1 0 0011 2H9zM7 8a1 1 0 012 0v6a1 1 0 11-2 0V8zm5-1a1 1 0 00-1 1v6a1 1 0 102 0V8a1 1 0 00-1-1z" clip-rule="evenodd" />
                        </svg>
                    </button>
                `;
                list.appendChild(li);
            });
            updateStats();
        }

        function addTask() {
            const input = document.getElementById('taskInput');
            if (input.value.trim() === '') return;
            tasks.push({ text: input.value, completed: false });
            input.value = '';
            renderTasks();
        }

        function toggleTask(index) {
            tasks[index].completed = !tasks[index].completed;
            renderTasks();
        }

        function deleteTask(index) {
            tasks.splice(index, 1);
            renderTasks();
        }

        function updateStats() {
            const completed = tasks.filter(t => t.completed).length;
            document.getElementById('taskStats').textContent = `${completed}/${tasks.length} completadas`;
        }

        // Eventos
        startBtn.addEventListener('click', toggleTimer);
        document.getElementById('addTimeBtn').addEventListener('click', addMinute);
        document.getElementById('resetBtn').addEventListener('click', () => {
            isRunning = false;
            clearInterval(timer);
            // Re-establecemos los ajustes por si se aumentaron con el botón +1 min
            settings.pomodoro = document.getElementById('inputPomodoro').value * 60;
            settings.short = document.getElementById('inputShort').value * 60;
            settings.long = document.getElementById('inputLong').value * 60;
            setMode(currentMode);
        });
        document.getElementById('addTaskBtn').addEventListener('click', addTask);
        document.getElementById('taskInput').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') addTask();
        });

        const modal = document.getElementById('settingsModal');
        document.getElementById('settingsBtn').addEventListener('click', () => modal.classList.replace('hidden', 'flex'));
        document.getElementById('closeSettings').addEventListener('click', () => modal.classList.replace('flex', 'hidden'));
        document.getElementById('saveSettings').addEventListener('click', () => {
            settings.pomodoro = document.getElementById('inputPomodoro').value * 60;
            settings.short = document.getElementById('inputShort').value * 60;
            settings.long = document.getElementById('inputLong').value * 60;
            modal.classList.replace('flex', 'hidden');
            setMode(currentMode);
        });

        setMode('pomodoro');
    </script>
</body>
</html>
